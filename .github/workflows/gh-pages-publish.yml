name: Main to gh-pages
on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/job-build.yml

  test:
    uses: ./.github/workflows/job-test.yml

  coverage:
    needs: test
    uses: ./.github/workflows/job-coverage.yml

  publish:
    needs: [build, test]
    environment: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - name: Install mdBook
        run: |
          target="x86_64-unknown-linux-gnu"
          mdbook_ver="v0.5.2"
          mdbook_sha="084e4342ba564db270108763e4:s04a7d1f309d932651a22484e93c0dc1a071f6d"
          curl -fsSLO "https://github.com/rust-lang/mdBook/releases/download/$mdbook_ver/mdbook-$mdbook_ver-$target.tar.gz"
          echo "$mdbook_sha ./mdbook-$mdbook_ver-$target.tar.gz" | sha256sum -c
          tar -xvzf "mdbook-$mdbook_ver-$target.tar.gz" -C ./docs/
      - run: npm run deploy
